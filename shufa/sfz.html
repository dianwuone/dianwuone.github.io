            //加零
            function buquan(num, length) {
                var numstr = num.toString();
                var l = numstr.length;
                if (numstr.length >= length) {
                    return numstr;
                }

                for (var q = 0; q < length - l; q++) {
                    numstr = "0" + numstr;
                }
                return numstr;
            }

            //效验码校验
            function ifon18(code) {
                code = code.split('');
                //∑(ai×Wi)(mod 11)
                //加权因子
                var factor = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];

                var sum = 0;
                var ai = 0;
                var wi = 0;
                for (var x = 0; x < 17; x++) {
                    ai = code[x];
                    wi = factor[x];
                    sum += ai * wi;
                }
                var last = parity[sum % 11];
                if (parity[sum % 11] == code[17]) {
                    return true;
                }else {
                    //tip = "校验位错误";
